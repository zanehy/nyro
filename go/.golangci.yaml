# golangci-lint (v2) config for the Nyro Go gateway.
# Run: golangci-lint run          (lint)
#      golangci-lint fmt          (gofumpt + goimports, in place)
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - unconvert

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nyroway/nyro/go
