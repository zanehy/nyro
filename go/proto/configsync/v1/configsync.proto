syntax = "proto3";

package nyro.configsync.v1;

option go_package = "github.com/nyroway/nyro/go/internal/configsync/pb;configsync";

// ConfigService is nyro's config-distribution control-plane API: the admin
// (control plane, sole DB reader) serves it; the gateway (data plane, no DB)
// subscribes to receive full config snapshots.
service ConfigService {
  // StreamConfig: the gateway sends its last-applied version (0 = full resync,
  // e.g. on connect/reconnect) plus node identity. The admin streams a full
  // ConfigSnapshot whenever config changes (each push increments version).
  // Long-lived stream; on drop the gateway reconnects with version=0 for a
  // full resync.
  rpc StreamConfig(Subscribe) returns (stream ConfigSnapshot);
}

message Subscribe {
  int64 version = 1;      // gateway's last-applied version; 0 = full resync
  string node_id = 2;      // stable per-process identifier (survives reconnects)
  string app_version = 3;  // gateway build version, for node visibility
  string hostname = 4;      // gateway's os.Hostname(), for node visibility
}

// ConfigSnapshot is a full, immutable configuration snapshot (config-schema:
// upstreams/routes/consumers). The gateway swaps its in-memory ConfigCache
// atomically on each received snapshot. Full-snapshot push (not incremental):
// small config, atomic swap, no merge bugs. The version field is the hook for
// future delta support.
message ConfigSnapshot {
  int64 version = 1;
  repeated Upstream upstreams = 2;
  repeated Route routes = 3;
  repeated Consumer consumers = 4;
  map<string, string> settings = 5;
}

message Upstream {
  string id = 1;
  string name = 2;
  string protocol = 4;
  string base_url = 5;
  string credentials_json = 6;
  string models_json = 7;
  string proxy_url = 8;
  bool enabled = 9;
}

message RouteUpstream {
  string id = 1;
  string route_id = 2;
  string upstream_id = 3;
  string model = 4;
  int32 weight = 5;
  int32 priority = 6;
  bool enabled = 7;
}

message Route {
  string id = 1;
  string model = 2;
  string balance = 3;
  bool enable_auth = 4;
  bool enable_payload = 5;
  bool enabled = 6;
  repeated RouteUpstream targets = 7;
}

// ConsumerKeyRef is the gateway-facing view of a consumer key: enough to
// authenticate a raw token locally (preview filter + hash compare) without ever
// carrying the plaintext token or DB-only bookkeeping fields (name, last_used_at).
message ConsumerKeyRef {
  string id = 1;
  string consumer_id = 2;
  string key_preview = 3;
  string key_hash = 4;
  bool enabled = 5;
  string expires_at = 6;
}

message ConsumerQuota {
  string id = 1;
  string consumer_id = 2;
  string quota_type = 3;
  int64 quota_limit = 4;
  string window = 5;
}

message Consumer {
  string id = 1;
  string name = 2;
  bool enabled = 3;
  repeated ConsumerKeyRef keys = 4;
  repeated string routes = 5; // granted route model names
  repeated ConsumerQuota quotas = 6;
}
