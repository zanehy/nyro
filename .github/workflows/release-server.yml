name: Release Server Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nyro-server-linux-x86_64
            binary_name: nyro-server
          - os: ubuntu-latest
            artifact_name: nyro-server-linux-x86_64-musl
            binary_name: nyro-server
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            artifact_name: nyro-server-linux-aarch64
            binary_name: nyro-server
          - os: ubuntu-24.04-arm
            artifact_name: nyro-server-linux-aarch64-musl
            binary_name: nyro-server
            target: aarch64-unknown-linux-musl
          - os: macos-15-intel
            artifact_name: nyro-server-macos-x86_64
            binary_name: nyro-server
          - os: macos-latest
            artifact_name: nyro-server-macos-aarch64
            binary_name: nyro-server
          - os: windows-latest
            artifact_name: nyro-server-windows-x86_64.exe
            binary_name: nyro-server.exe
          - os: windows-11-arm
            artifact_name: nyro-server-windows-arm64.exe
            binary_name: nyro-server.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target != '' && runner.os == 'Linux'
        run: sudo apt-get install -y musl-tools

      - name: Set CFLAGS for musl targets (sqlite-vec BSD type compatibility)
        if: contains(matrix.target, 'musl') && runner.os == 'Linux'
        run: |
          TARGET_ENV=$(echo "${{ matrix.target }}" | tr '-' '_')
          echo "CFLAGS_${TARGET_ENV}=-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm -C webui install --frozen-lockfile

      - name: Build webui
        run: pnpm -C webui build

      - name: Build nyro-server
        run: cargo build -p nyro-server --release ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          BIN_PATH=${{ matrix.target != '' && format('target/{0}/release/{1}', matrix.target, matrix.binary_name) || format('target/release/{0}', matrix.binary_name) }}
          cp "$BIN_PATH" "dist/${{ matrix.artifact_name }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target\release\${{ matrix.binary_name }}" "dist\${{ matrix.artifact_name }}"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  publish-server:
    runs-on: ubuntu-latest
    needs: build-server
    permissions:
      contents: write

    steps:
      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nyro-server-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Upload SHA256SUMS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyro-server-sha256sums
          path: artifacts/SHA256SUMS.txt

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Nyro ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: artifacts/*
          replacesArtifacts: true
          makeLatest: legacy

      - name: Trigger docker-nyro build
        if: startsWith(github.ref, 'refs/tags/')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCKER_NYRO_TOKEN }}
          repository: nyroway/docker-nyro
          event-type: release-published
          client-payload: '{"version": "${{ github.ref_name }}"}'
