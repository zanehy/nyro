name: CI

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Linux system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Build webui
        run: |
          pnpm -C webui install --frozen-lockfile
          pnpm -C webui build

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --exclude nyro-desktop

      - name: Build nyro-server (debug)
        run: cargo build -p nyro-server

      - name: Check nyro-server slim build (no embed-webui, no webui/dist required)
        run: cargo check -p nyro-server --no-default-features

      - name: Build nyro-tools (debug)
        run: cargo build -p nyro-tools

      - name: Upload nyro-server binary
        uses: actions/upload-artifact@v4
        with:
          name: nyro-server-linux-x86_64
          path: target/debug/nyro-server
          retention-days: 1

      - name: Upload nyro-tools binary
        uses: actions/upload-artifact@v4
        with:
          name: nyro-tools-linux-x86_64
          path: target/debug/nyro-tools
          retention-days: 1

  go-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # mysql/postgres here are throwaway "dev" databases for `atlas migrate
    # diff`, not real targets — go/atlas.hcl points at them by default
    # (localhost:13306 / :15432), matching what a local dev spins up too.
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass
        ports:
          - 13306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pass
        ports:
          - 15432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Go format check (gofumpt + goimports)
        run: make go-fmt-check

      - name: Go vet
        run: make go-vet

      - name: Go lint (golangci-lint)
        run: make go-lint

      - name: Go test
        run: make go-test

      # go-migrate-* below run atlas via the free Community Edition docker
      # image (see go/atlas.hcl and Makefile) — ubuntu-latest runners already
      # have docker, nothing extra to install.
      - name: Create atlas dev-database scratch schemas
        run: |
          mysql -h127.0.0.1 -P13306 -uroot -ppass -e "CREATE DATABASE IF NOT EXISTS dev;"
          PGPASSWORD=pass psql -h127.0.0.1 -p15432 -Upostgres -c "CREATE DATABASE dev;" || true

      # Two different checks, see go/docs/schema/migrations.md: lint
      # statically analyzes the committed migration SQL (destructive
      # changes, locking risks); verify catches a model change with no
      # matching migration file, which lint alone does not.
      - name: Lint committed migrations (mysql + postgres)
        run: make go-migrate-lint

      - name: Verify go/internal/storage/model matches committed migrations (mysql + postgres)
        run: make go-migrate-verify

  unit-tests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Run unit tests
        run: cargo test --workspace --exclude nyro-desktop --exclude nyro-server

  e2e-proxy-tests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download nyro-server binary
        uses: actions/download-artifact@v4
        with:
          name: nyro-server-linux-x86_64
          path: target/debug

      - name: Download nyro-tools binary
        uses: actions/download-artifact@v4
        with:
          name: nyro-tools-linux-x86_64
          path: target/debug

      - name: Make binaries executable
        run: chmod +x target/debug/nyro-server target/debug/nyro-tools

      - name: Install Python test deps
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run proxy E2E protocol-matrix tests
        run: python3 -m pytest tests/e2e/proxy -vv -s -rA -m proxy
        env:
          NYRO_BINARY: target/debug/nyro-server
          NYRO_TOOLS_BINARY: target/debug/nyro-tools

  e2e-admin-tests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download nyro-server binary
        uses: actions/download-artifact@v4
        with:
          name: nyro-server-linux-x86_64
          path: target/debug

      - name: Make binary executable
        run: chmod +x target/debug/nyro-server

      - name: Install Python test deps
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run admin E2E tests
        run: python3 -m pytest tests/e2e/admin -vv -s -rA -m admin
        env:
          NYRO_BINARY: target/debug/nyro-server
